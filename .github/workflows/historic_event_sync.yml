name: Manual Backfill
on:
  workflow_dispatch:
    inputs:
      start_year:
        description: "Year to start from"
        required: true
        default: "2005"
      end_year:
        description: "Year to end at"
        required: true
        default: "2025"

jobs:
  backfill:
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Run Backfill
        run: |
          uv run python main.py --start ${{ github.event.inputs.start_year }} --end ${{ github.event.inputs.end_year }}
        env:
          TBA_KEY: ${{ secrets.TBA_KEY }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY: ${{ secrets.R2_ACCESS_KEY }}
          R2_SECRET_KEY: ${{ secrets.R2_SECRET_KEY }}
          R2_BUCKET_NAME: ${{ secrets.BUCKET_NAME }}

      - name: Update Catalog
        run: uv run python generate_catalog.py
        env:
          LANG: C.UTF-8
          LC_ALL: C.UTF-8
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY: ${{ secrets.R2_ACCESS_KEY }}
          R2_SECRET_KEY: ${{ secrets.R2_SECRET_KEY }}
          R2_BUCKET_NAME: ${{ secrets.BUCKET_NAME }}

      - name: Purge Cloudflare Cache
        run: |
          curl -X POST "https://api.cloudflare.com/client/v4/zones/${{ secrets.CLOUDFLARE_ZONE_ID }}/purge_cache" \
          -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
          -H "Content-Type: application/json" \
          --data '{"files": ["https://frc-db.dev/data.db"]}'
